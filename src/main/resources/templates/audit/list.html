<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/app-layout :: layout(~{::main})}">
<body>
<th:block th:fragment="main">
<div class="page-header">
  <div><h1>Audit log</h1><p class="lead">Security and change history</p></div>
  
</div>

<div class="panel">
  <div class="panel-body p-0 table-responsive">
    <table class="table table-sm mb-0">
      <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead>
      <tbody>
        <tr th:each="log : ${logs}">
          <td class="text-muted text-nowrap" th:text="${#temporals.format(log.createdAt,'MMM dd HH:mm:ss')}"></td>
          <td th:text="${log.username}"></td>
          <td><code th:text="${log.action}"></code></td>
          <td th:text="${log.entityType}"></td>
          <td th:text="${log.details}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<nav th:if="${page != null and page.totalPages > 1}" class="mt-3">
  <ul class="pagination pagination-sm justify-content-center mb-0">
    <li class="page-item" th:classappend="${!page.hasPrev} ? 'disabled'">
      <a class="page-link" th:href="@{/audit(page=${page.prev})}">Previous</a>
    </li>
    <li class="page-item disabled"><span class="page-link" th:text="${'Page ' + (page.number + 1) + ' of ' + page.totalPages}"></span></li>
    <li class="page-item" th:classappend="${!page.hasNext} ? 'disabled'">
      <a class="page-link" th:href="@{/audit(page=${page.next})}">Next</a>
    </li>
  </ul>
</nav>

</th:block>
</body>
</html>
