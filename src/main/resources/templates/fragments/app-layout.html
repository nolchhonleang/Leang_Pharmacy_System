<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body>
<div class="app-wrapper">
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>
  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
  <div class="app-main">
    <header class="app-topbar">
      <button type="button" class="topbar-menu-btn" id="sidebarToggle" aria-label="Menu">
        <i class="bi bi-list"></i>
      </button>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="/dashboard">Home</a></li>
          <li class="breadcrumb-item active" th:text="${pageTitle}">Page</li>
        </ol>
      </nav>
    </header>
    <main class="app-content">
      <div th:if="${success}" class="alert alert-success alert-toast alert-dismissible fade show animate-slide-down" data-auto-dismiss>
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-toast alert-dismissible fade show animate-slide-down">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      <div class="page-enter">
        <th:block th:replace="${content}"></th:block>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
