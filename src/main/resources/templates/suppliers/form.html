<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/app-layout :: layout(~{::main})}">
<body>
<th:block th:fragment="main">
<div class="page-header">
  <div><h1>Supplier</h1><p class="lead">Vendor details</p></div>
  
</div>

<div class="panel"><div class="panel-body">
<form method="post" th:action="@{/suppliers/save}" th:object="${supplier}">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" th:field="*{id}"/>
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" th:field="*{name}" required/></div>
    <div class="col-md-6"><label class="form-label">Contact person</label><input class="form-control" th:field="*{contactPerson}"/></div>
    <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" th:field="*{phone}"/></div>
    <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" th:field="*{email}"/></div>
    <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" th:field="*{address}" rows="2"></textarea></div>
  </div>
  <button type="submit" class="btn btn-primary-brand mt-3">Save supplier</button>
  <a href="/suppliers" class="btn btn-outline-secondary mt-3">Cancel</a>
</form>
</div></div>

</th:block>
</body>
</html>
