<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/app-layout :: layout(~{::main})}">
<body>
<th:block th:fragment="main">
<div class="page-header">
  <div><h1>Medicine</h1><p class="lead">Add or update catalog entry</p></div>
  
</div>

<div class="panel"><div class="panel-body">
<form method="post" th:action="@{/medicines/save}" th:object="${medicine}">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" th:field="*{id}"/>
  <div class="row g-3">
    <div class="col-md-4"><label class="form-label">SKU</label><input class="form-control" th:field="*{sku}" required/></div>
    <div class="col-md-8"><label class="form-label">Name</label><input class="form-control" th:field="*{name}" required/></div>
    <div class="col-md-4"><label class="form-label">Category</label>
      <select name="categoryId" class="form-select">
        <option value="">— None —</option>
        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                th:selected="${medicine.category != null and medicine.category.id == c.id}"></option>
      </select>
    </div>
    <div class="col-md-4"><label class="form-label">Unit price ($)</label><input type="number" step="0.01" min="0" class="form-control" th:field="*{unitPrice}"/></div>
    <div class="col-md-4"><label class="form-label">Cost ($)</label><input type="number" step="0.01" min="0" class="form-control" th:field="*{costPrice}"/></div>
    <div class="col-md-4"><label class="form-label">Reorder level</label><input type="number" min="0" class="form-control" th:field="*{reorderLevel}"/></div>
    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" th:field="*{requiresPrescription}" id="rxCheck"/>
        <label class="form-check-label" for="rxCheck">Requires prescription</label>
      </div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary-brand mt-3">Save medicine</button>
  <a href="/medicines" class="btn btn-outline-secondary mt-3">Cancel</a>
</form>
</div></div>

</th:block>
</body>
</html>
