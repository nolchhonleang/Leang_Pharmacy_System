<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/app-layout :: layout(~{::main})}">
<body>
<th:block th:fragment="main">
<div class="page-header">
  <div><h1>User account</h1><p class="lead">Create or update staff login</p></div>
  
</div>

<div class="panel"><div class="panel-body">
<form method="post" th:action="@{/users/save}">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" name="id" th:value="${user.id}"/>
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Username</label><input name="username" class="form-control" th:value="${user.username}" required/></div>
    <div class="col-md-6"><label class="form-label">Full name</label><input name="fullName" class="form-control" th:value="${user.fullName}" required/></div>
    <div class="col-md-6"><label class="form-label">Password</label><input name="password" type="password" class="form-control" th:placeholder="${user.id != null ? 'Leave blank to keep' : 'Required'}" th:required="${user.id == null}"/></div>
    <div class="col-md-6"><label class="form-label">Role</label>
      <select name="role" class="form-select" required>
        <option th:each="r : ${roles}" th:value="${r}" th:text="${#strings.replace(r.name(), 'ROLE_', '')}" th:selected="${user.role == r}"></option>
      </select>
    </div>
    <div class="col-12"><div class="form-check">
      <input type="hidden" name="active" value="false"/>
      <input class="form-check-input" type="checkbox" name="active" value="true" th:checked="${user.active}"/>
      <label class="form-check-label">Account active</label>
    </div></div>
  </div>
  <button type="submit" class="btn btn-primary-brand mt-3">Save user</button>
  <a href="/users" class="btn btn-outline-secondary mt-3">Cancel</a>
</form>
</div></div>

</th:block>
</body>
</html>
