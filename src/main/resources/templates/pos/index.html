<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/app-layout :: layout(~{::main})}">
<body>
<th:block th:fragment="main">
<div class="page-header">
  <div><h1>Point of Sale</h1><p class="lead">Fast search checkout — type product name or SKU</p></div>
</div>

<form method="post" th:action="@{/pos/checkout}" id="posForm">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <div class="row g-3">
    <div class="col-lg-5">
      <div class="panel mb-3">
        <div class="panel-header"><h2>Search</h2></div>
        <div class="panel-body">
          <input type="search" id="posSearch" class="form-control form-control-lg" placeholder="Search medicine…" autocomplete="off" autofocus/>
          <div id="posResults" class="list-group list-group-flush mt-3" style="max-height:320px;overflow-y:auto"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-body">
          <div class="row g-2">
            <div class="col-12"><label class="form-label">Customer</label>
              <select name="customerId" class="form-select">
                <option value="">Walk-in</option>
                <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.fullName}"></option>
              </select>
            </div>
            <div class="col-6"><label class="form-label">Payment</label>
              <select name="paymentMethod" class="form-select"><option>CASH</option><option>CARD</option><option>INSURANCE</option></select>
            </div>
            <div class="col-6"><label class="form-label">Discount ($)</label>
              <input name="discount" type="number" step="0.01" min="0" value="0" class="form-control"/>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="panel">
        <div class="panel-header d-flex justify-content-between align-items-center">
          <h2 class="mb-0">Cart</h2>
          <span class="fw-bold text-primary" id="cartSubtotal">$0.00</span>
        </div>
        <div class="panel-body p-0 table-responsive">
          <p id="cartEmpty" class="empty-state py-4 mb-0">Cart is empty — search and add items</p>
          <table class="table mb-0">
            <thead><tr><th>Item</th><th class="text-end">Price</th><th class="text-center">Qty</th><th class="text-end">Total</th><th></th></tr></thead>
            <tbody id="cartBody"></tbody>
          </table>
        </div>
        <div class="pos-checkout-bar">
          <button type="submit" class="btn btn-primary-brand btn-lg w-100"><i class="bi bi-check2-circle me-1"></i> Complete sale</button>
        </div>
      </div>
    </div>
  </div>
</form>
<script th:src="@{/js/pos.js}"></script>
</th:block>
</body>
</html>
