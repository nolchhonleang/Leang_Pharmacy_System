spring:
  application:
    name: leang-pharmacy-system
  datasource:
    url: jdbc:h2:file:./data/pharmacy;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  thymeleaf:
    cache: true
  cache:
    type: caffeine

server:
  port: 8082
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
  servlet:
    session:
      timeout: 30m

pharmacy:
  app-name: Leang-Pharmacy-System
  low-stock-threshold: 10
  expiry-warning-days: 90
  page-size: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.springframework.security: WARN
    com.hug.pharmacy: INFO
